<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="description" content="Sua casa fora de casa!. Atendimento 24h.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pousada Central | Reservas Online</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" href="favicon.png">
</head>

<body>

<main class="card">

  <img src="logo.png" alt="Pousada Central" class="logo">

  <h1>Pousada Central</h1>
  <p class="subtitle">Centro • Alto do Rodrigues/RN</p>
  <button class="dark-toggle" onclick="toggleDarkMode()">
  🌙 Modo Noturno
</button>

  <!---- <div class="event">
    <h2>Alto Folia</h2>
    <p>27 a 29 de Março</p>
  </div> /* -->

  <form id="reservaForm">

  <div class="input-group">
    <span class="icon">
      <!-- Ícone usuário -->
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-4 0-8 2-8 5v3h16v-3c0-3-4-5-8-5z"/></svg>
    </span>
    <input type="text" id="nome" placeholder="Seu nome" required>
  </div>

  <div class="input-group">
    <span class="icon">
      <!-- Ícone telefone -->
      <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.5 3 3.6 5.1 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.2 1.3.4 2.7.6 4.1.6.7 0 1.2.5 1.2 1.2V21c0 .7-.5 1.2-1.2 1.2C10.3 22.2 1.8 13.7 1.8 3.2 1.8 2.5 2.3 2 3 2h4.4c.7 0 1.2.5 1.2 1.2 0 1.4.2 2.8.6 4.1.1.4 0 .9-.3 1.2l-2.3 2.3z"/></svg>
    </span>
    <input type="tel" id="telefone" placeholder="Seu WhatsApp" required>
  </div>

  <div class="input-group">
    <span class="icon">
      <!-- Ícone calendário -->
      <svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3V2zm13 6H4v12h16V8z"/></svg>
    </span>
    <input type="date" id="entrada" required>
  </div>

  <div class="input-group">
    <span class="icon">
      <svg viewBox="0 0 24 24"><path d="M7 2h2v2h6V2h2v2h3v18H4V4h3V2zm13 6H4v12h16V8z"/></svg>
    </span>
    <input type="date" id="saida" required>
  </div>

  <div class="input-group">
    <span class="icon">
      <!-- Ícone pessoas -->
      <svg viewBox="0 0 24 24"><path d="M16 11c1.7 0 3-1.3 3-3S17.7 5 16 5s-3 1.3-3 3 1.3 3 3 3zM8 11c1.7 0 3-1.3 3-3S9.7 5 8 5 5 6.3 5 8s1.3 3 3 3zm0 2c-2.7 0-8 1.3-8 4v3h10v-3c0-1.1.5-2 1.2-2.8C10.4 13.3 9.1 13 8 13zm8 0c-1.1 0-2.4.3-3.2 1.2.7.8 1.2 1.7 1.2 2.8v3h10v-3c0-2.7-5.3-4-8-4z"/></svg>
    </span>
    <input type="number" id="pessoas" placeholder="Pessoas (máx 3)" min="1" max="3" required>
  </div>

  <button type="button" onclick="enviarWhats()">
    📲 Reservar pelo WhatsApp
  </button>

</form>

  <a class="btn-map"
     href="https://www.google.com/maps/place/Av.+Angelo+Varela,+531+-+Centro,+Alto+do+Rodrigues+-+RN"
     target="_blank">
     📍 Ver localização
  </a>

  <footer>
    <p>AV. Angelo Varela, 531 </p>
    <p>(84) 3523-2356</p>
  </footer>

  <div id="modalResumo" class="modal">
  <div class="modal-box">
    <h3>Confirme sua reserva</h3>
    <div id="resumoConteudo"></div>

    <div class="modal-actions">
      <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirmar" onclick="confirmarEnvio()">Confirmar</button>
    </div>
  </div>
</div>

</main>

<script>

const numero = "558435232356";
let mensagemFinal = "";

function formatarDataBR(dataISO){
  const partes = dataISO.split("-");
  return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

const hoje = new Date().toISOString().split("T")[0];
document.getElementById("entrada").min = hoje;
document.getElementById("saida").min = hoje;

document.getElementById("entrada").addEventListener("change", function(){
  document.getElementById("saida").min = this.value;
});

function enviarWhats(){

  const nome = document.getElementById("nome").value.trim();
  const telefone = document.getElementById("telefone").value.trim();
  const entrada = document.getElementById("entrada").value;
  const saida = document.getElementById("saida").value;
  const pessoas = document.getElementById("pessoas").value;

  if(!nome || !telefone || !entrada || !saida || !pessoas){
    alert("Preencha todos os campos.");
    return;
  }

  if(pessoas > 3){
    alert("Máximo de 3 pessoas por reserva.");
    return;
  }

  if(saida < entrada){
    alert("A data de saída não pode ser menor que a entrada.");
    return;
  }

  const entradaBR = formatarDataBR(entrada);
  const saidaBR = formatarDataBR(saida);

  mensagemFinal =
`Olá! Quero fazer uma reserva na *Pousada Central*.

  *Nome:* ${nome}
  *WhatsApp:* ${telefone}
  *Entrada:* ${entradaBR}
  *Saída:* ${saidaBR}
  *Pessoas:* ${pessoas}

Pode confirmar disponibilidade e o valor certinho, por favor?`;

  document.getElementById("resumoConteudo").innerHTML = `
    <p><strong>Nome:</strong> ${nome}</p>
    <p><strong>Entrada:</strong> ${entradaBR}</p>
    <p><strong>Saída:</strong> ${saidaBR}</p>
    <p><strong>Pessoas:</strong> ${pessoas}</p>
  `;

  document.getElementById("modalResumo").classList.add("active");
}

function fecharModal(){
  document.getElementById("modalResumo").classList.remove("active");
}

function confirmarEnvio(){
  const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagemFinal)}`;
  window.open(url, "_blank");
  fecharModal();
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
